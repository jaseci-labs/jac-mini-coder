name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install native jac
        run: |
          curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: project deps
        run: jac install || true
      - name: jac check
        run: jac check main.jac minicoder.jac cli.jac gen_pairs.jac
      - name: shell scripts parse
        run: bash -n install.sh && bash -n box_init.sh
