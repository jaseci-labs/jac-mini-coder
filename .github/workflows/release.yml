name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install native jac
        run: |
          curl -fsSL https://raw.githubusercontent.com/jaseci-labs/jaseci/main/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: project deps
        run: jac install || true
      - name: jac check
        run: jac check main.jac jacsmith.jac cli.jac gen_pairs.jac
      - name: shell scripts parse
        run: bash -n install.sh && bash -n box_init.sh

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create GitHub release (install.sh attached)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" install.sh \
            --title "jac-mini-coder $GITHUB_REF_NAME" \
            --generate-notes
