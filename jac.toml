# jac-mini-coder — project config.
# The two byllm settings are REQUIRED when running gemma-family models:
#   native_tools=true  defuses byLLM's gemma name-sniff (its tool-call recovery
#                      eats any typed JSON output with a top-level "name" field)
#   think=false        defuses gemma's thinking-channel content burial

[project]
name = "jac-mini-coder"
version = "0.4.2"
description = "A Jac coding agent small enough for small models — compiled task-graphs, typed slots, code-owned gates"
entry-point = "main.jac"

# These pins mirror jac's built-in 'llm' capability (jaclang/project/
# capabilities.jac) so `jac install` resolves to versions with prebuilt wheels.
# litellm is REQUIRED at runtime (byLLM's LLM transport) and is NOT bundled in
# the jac runtime — it must be installed here. But `litellm = "latest"` pulls
# Rust-built deps (pydantic-core, tiktoken) that have no wheels on new Python
# (3.14) → pip tries to build them via maturin and the whole install fails.
# The pinned older litellm (<=1.82.6) resolves to deps that DO ship wheels.
# loguru is byLLM's logger; rich drives the TUI.
[dependencies]
litellm = ">=1.70.0,<=1.82.6"
httpx = ">=0.27.0"
loguru = ">=0.7.2,<0.8.0"
pillow = ">=12.0.0,<13.0.0"
rich = "latest"

[plugins.byllm.model]
default_model = "ollama_chat/gemma4:e4b"
native_tools = true

[plugins.byllm.call_params]
think = false
