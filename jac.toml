# jac-mini-coder — project config.
# The two byllm settings are REQUIRED when running gemma-family models:
#   native_tools=true  defuses byLLM's gemma name-sniff (its tool-call recovery
#                      eats any typed JSON output with a top-level "name" field)
#   think=false        defuses gemma's thinking-channel content burial

[project]
name = "jac-mini-coder"
version = "0.1.0"
description = "A Jac coding agent small enough for small models — compiled task-graphs, typed slots, code-owned gates"
entry-point = "main.jac"

# litellm is intentionally NOT listed here: it ships inside the jac runtime's
# byLLM closure (byLLM can't run without it), and `pip install litellm` pulls
# Rust-built deps (pydantic-core, tiktoken) that have no wheels on new Python
# versions — the whole install then fails trying to build them via maturin.
# httpx / rich / pillow are pure-Python/C with wheels and install cleanly.
[dependencies]
httpx = "latest"
rich = "latest"
pillow = "latest"

[plugins.byllm.model]
default_model = "ollama_chat/gemma4:e4b"
native_tools = true

[plugins.byllm.call_params]
think = false
